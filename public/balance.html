<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseSupply - Balance Sheet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .top-bar {
            width: 700px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .btn-back {
            padding: 10px 20px;
            background: linear-gradient(135deg, #444, #111);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.9;
        }

        .summary-container {
            display: flex;
            justify-content: space-between;
            width: 700px;
            margin-bottom: 20px;
            gap: 10px;
        }

        .card {
            background: white;
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #eef2f5;
        }

        .card h3 {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
        }

        .search-container {
            width: 700px;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-container input {
            flex: 1;
            height: 40px;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            background-color: white;
        }

        .search-container input:focus {
            border-color: teal;
        }

        .display-container {
            width: 700px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f5;
        }

        #balanceTable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #eef2f5;
        }

        #balanceTable th {
            background-color: #f8fafc;
            color: #475569;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
            border-bottom: 2px solid #e2e8f0;
            text-align: center;
        }

        #balanceTable td {
            padding: 14px 16px;
            color: #334155;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        #balanceTable tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        #balanceTable tbody tr:hover {
            background-color: #f1f5f9;
        }

        #balanceTable tbody tr:last-child td {
            border-bottom: none;
        }

        .negative-balance {
            background-color: #fee2e2;
            color: #dc2626 !important;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .positive-balance {
            background-color: #dcfce7;
            color: #16a34a !important;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        .pagination button {
            padding: 8px 16px;
            border: none;
            background: teal;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #pageInfo {
            font-weight: bold;
            font-size: 14px;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
</div>

<div class="summary-container">
    <div class="card">
        <h3>Total Customers</h3>
        <p id="statCustomers">0</p>
    </div>
    <div class="card">
        <h3>Total Out Qty</h3>
        <p id="statOut" style="color: navy;">0</p>
    </div>
    <div class="card">
        <h3>Total In Qty</h3>
        <p id="statIn" style="color: teal;">0</p>
    </div>
    <div class="card">
        <h3>Total Balance</h3>
        <p id="statBalance">0</p>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchName" placeholder="Filter by Customer Name..." list="customerList">
    <datalist id="customerList"></datalist> 
    <input type="text" id="searchItem" placeholder="Filter by Item Name...">
</div>

<div class="display-container">
    <table id="balanceTable">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Item</th>
                <th>Total Out Qty</th>
                <th>Total In Qty</th>
                <th>Current Balance</th>
            </tr>
        </thead>
        <tbody id="tablebody"></tbody>
    </table>

    <div class="pagination">
        <button id="btnPrev">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="btnNext">Next</button>
    </div>
</div>

<!-- Firebase Modular Integration SDKs -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Update with your project configuration
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let masterRecords = []; // Holds computed balance metrics globally
    let filteredRecords = []; // Tracking records post text filters
    let currentPage = 1;
    const rowsPerPage = 10;

    // Initialization lifecycle
    document.addEventListener('DOMContentLoaded', async () => {
        await processBalanceSheetData();
        setupInputFilters();
        setupPaginationControls();
    });

    // Fetches collections directly from Firestore and maps calculations
    async function processBalanceSheetData() {
        try {
            // Read raw entries across streams
            const outSnapshot = await getDocs(collection(db, "out"));
            const inSnapshot = await getDocs(collection(db, "in"));

            const aggregationMap = {};

            // Accumulate out quantities
            outSnapshot.forEach(doc => {
                const data = doc.data();
                const name = data.name ? data.name.trim() : "Unknown";
                const item = data.item ? data.item.trim() : "Unknown Item";
                const qty = Number(data.qty) || 0;
                const compositeKey = `${name}|||${item}`;

                if (!aggregationMap[compositeKey]) {
                    aggregationMap[compositeKey] = { name, item, total_out: 0, total_in: 0 };
                }
                aggregationMap[compositeKey].total_out += qty;
            });

            // Accumulate in quantities
            inSnapshot.forEach(doc => {
                const data = doc.data();
                const name = data.name ? data.name.trim() : "Unknown";
                const item = data.item ? data.item.trim() : "Unknown Item";
                const qty = Number(data.qty) || 0;
                const compositeKey = `${name}|||${item}`;

                if (!aggregationMap[compositeKey]) {
                    aggregationMap[compositeKey] = { name, item, total_out: 0, total_in: 0 };
                }
                aggregationMap[compositeKey].total_in += qty;
            });

            // Flatten structure and process mathematical differences
            masterRecords = Object.values(aggregationMap).map(record => {
                // balance = out - in
                const computedBalance = record.total_out - record.total_in;
                return {
                    ...record,
                    balance: computedBalance
                };
            });

            // Populate the dropdown helper list with unique user entries
            const uniqueCustomerNames = [...new Set(masterRecords.map(r => r.name))];
            const datalist = document.getElementById('customerList');
            datalist.innerHTML = uniqueCustomerNames.map(name => `<option value="${name}">`).join('');

            // Apply filter context down to visualization render layers
            applyUIFilters();

        } catch (error) {
            console.error("Firestore balance process initialization failure:", error);
        }
    }

    // Handles filtering matching local arrays instantly
    function applyUIFilters() {
        const nameQuery = document.getElementById('searchName').value.toLowerCase();
        const itemQuery = document.getElementById('searchItem').value.toLowerCase();

        filteredRecords = masterRecords.filter(record => {
            const matchName = record.name.toLowerCase().includes(nameQuery);
            const matchItem = record.item.toLowerCase().includes(itemQuery);
            return matchName && matchItem;
        });

        currentPage = 1;
        updateSummaryCards(filteredRecords);
        renderTableRows();
    }

    // Updates calculation panels metrics dynamically
    function updateSummaryCards(recordsList) {
        const uniqueCustomers = new Set(recordsList.map(r => r.name)).size;
        let runningTotalOut = 0;
        let runningTotalIn = 0;
        let runningGlobalBalance = 0;

        recordsList.forEach(r => {
            runningTotalOut += r.total_out;
            runningTotalIn += r.total_in;
            runningGlobalBalance += r.balance;
        });

        document.getElementById('statCustomers').innerText = uniqueCustomers;
        document.getElementById('statOut').innerText = runningTotalOut;
        document.getElementById('statIn').innerText = runningTotalIn;

        const balElement = document.getElementById('statBalance');

        if (runningGlobalBalance > 0) {
            balElement.innerText = "-" + runningGlobalBalance;
            balElement.className = "negative-balance";
        } else if (runningGlobalBalance < 0) {
            balElement.innerText = Math.abs(runningGlobalBalance);
            balElement.className = "positive-balance";
        } else {
            balElement.innerText = "0";
            balElement.className = "";
        }
    }

    // Displays relevant records per active index configuration
    function renderTableRows() {
        const tablebody = document.getElementById('tablebody');
        tablebody.innerHTML = "";

        const totalPages = Math.ceil(filteredRecords.length / rowsPerPage) || 1;
        const startIndex = (currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;

        const paginatedItems = filteredRecords.slice(startIndex, endIndex);

        if (paginatedItems.length === 0) {
            tablebody.innerHTML = `
                <tr>
                    <td colspan="5" style="color:#888;padding:20px;">
                        No matching records found
                    </td>
                </tr>
            `;
        } else {
            paginatedItems.forEach(item => {
                let balanceText = "";
                let balanceClass = "";

                if (item.balance > 0) {
                    balanceText = "-" + item.balance;
                    balanceClass = "negative-balance";
                } else if (item.balance < 0) {
                    balanceText = Math.abs(item.balance);
                    balanceClass = "positive-balance";
                } else {
                    balanceText = "0";
                    balanceClass = "";
                }

                tablebody.innerHTML += `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td>${item.item}</td>
                        <td>${item.total_out}</td>
                        <td>${item.total_in}</td>
                        <td>
                            <span class="${balanceClass}">
                                ${balanceText}
                            </span>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('btnPrev').disabled = (currentPage === 1);
        document.getElementById('btnNext').disabled = (currentPage === totalPages);
    }

    // Event hooks and listeners assignment
    function setupInputFilters() {
        document.getElementById('searchName').addEventListener('keyup', applyUIFilters);
        document.getElementById('searchItem').addEventListener('keyup', applyUIFilters);
    }

    function setupPaginationControls() {
        document.getElementById('btnPrev').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTableRows();
            }
        });

        document.getElementById('btnNext').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredRecords.length / rowsPerPage) || 1;
            if (currentPage < totalPages) {
                currentPage++;
                renderTableRows();
            }
        });
    }
</script>
</body>
</html>
