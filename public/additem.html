<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Item Master</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#16a085,#2980b9);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:900px;
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}

h2{

text-align:center;
margin-bottom:20px;
color:#0f766e;

}

.form{

display:flex;
gap:10px;
margin-bottom:20px;

}

.form input{

flex:1;
height:45px;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
outline:none;

}

.form button{

width:140px;
border:none;
background:#0f766e;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.form button:hover{

background:#115e59;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#0f766e;
color:white;
padding:12px;

}

td{

padding:10px;
text-align:center;
border-bottom:1px solid #ddd;

}

tr:hover{

background:#f5f5f5;

}

.edit{

background:#f59e0b;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;

}

.delete{

background:#dc2626;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;

}

.back{

display:inline-block;
margin-top:20px;
text-decoration:none;
background:#333;
color:white;
padding:10px 18px;
border-radius:8px;

}

</style>

</head>

<body>

<div class="container">

<h2>Item Master</h2>

<div class="form">

<input
type="text"
id="itemName"
oninput="this.value=this.value.replace(/[^A-Za-z0-9 .()-]/g,'')">
<button onclick="saveItem()">

Save Item

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Item Name</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<a href="dashboard.html" class="back">

← Back

</a>

</div>
<script>

let editId = null;

document.addEventListener("DOMContentLoaded", loadItems);

async function loadItems(){

    const res = await fetch("http://localhost:3000/item/data");

    const data = await res.json();

    const table = document.getElementById("tableBody");

    table.innerHTML = "";

    data.forEach(item=>{

        table.innerHTML += `

        <tr>

            <td>${item.id}</td>

            <td>${item.item_name}</td>

            <td>

                <button
                class="edit"
                onclick="editItem(${item.id},'${item.item_name}')">
                Edit
                </button>

                <button
                class="delete"
                onclick="deleteItem(${item.id})">
                Delete
                </button>

            </td>

        </tr>

        `;

    });

}

async function saveItem(){

    const item_name =
    document.getElementById("itemName").value.trim();

    if(item_name==""){

        alert("Enter Item Name");

        return;

    }

    let url="";
    let method="";

    if(editId==null){

        url="http://localhost:3000/item/add";

        method="POST";

    }

    else{

        url=`http://localhost:3000/item/update/${editId}`;

        method="PUT";

    }

    const res = await fetch(url,{

        method:method,

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            item_name:item_name

        })

    });

    const data=await res.json();

    alert(data.message);

    document.getElementById("itemName").value="";

    editId=null;

    document.querySelector(".form button").innerHTML="Save Item";

    loadItems();

}

function editItem(id,name){

    editId=id;

    document.getElementById("itemName").value=name;

    document.querySelector(".form button").innerHTML="Update Item";

    document.getElementById("itemName").focus();

}

async function deleteItem(id){

    if(confirm("Delete this Item ?")){

        await fetch(

            `http://localhost:3000/item/delete/${id}`,

            {

                method:"DELETE"

            }

        );

        loadItems();

    }

}

document.getElementById("itemName").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        saveItem();

    }

});

</script>

</body>
</html>
