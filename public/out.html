<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseSupply - OUT Entry</title>
</head>
<style>
    body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
}
.home-page{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}
.home-page h1{
    text-align:center;
    margin-bottom:25px;
    color:#0f766e;
    font-family:Arial,sans-serif;
}
.input-box{
    position:relative;
    margin-bottom:18px;
}
.input-box input{
    width:100%;
    height:48px;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:0 15px;
    outline:none;
    font-size:15px;
    transition:.25s;
    background:white;
}

.input-box input:focus{
    border-color:#0f766e;
    box-shadow:0 0 8px rgba(15,118,110,.25);
}
.dropdown-list{
    position:absolute;
    top:52px;
    left:0;
    width:100%;
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    max-height:220px;
    overflow-y:auto;
    display:none;
    z-index:999;
    box-shadow:0 10px 20px rgba(0,0,0,.12);
}
.dropdown-item{
    padding:12px 15px;
    cursor:pointer;
    transition:.2s;
    font-size:15px;
}
.dropdown-item:hover{
    background:#0f766e;
    color:white;
}
.dropdown-item.active{
    background:#0f766e;
    color:white;
}
.btn-submit{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#0f766e,#115e59);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}
.btn-submit:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(15,118,110,.30);
}
.view-link{
    display:block;
    text-align:center;
    margin-top:14px;
    text-decoration:none;
    color:#0f766e;
    font-weight:bold;
}
.view-link:hover{
    color:#115e59;
    text-decoration:underline;
}
</style>
<body>
    <div class="home-page">
    <h1> HouseSupply - OUT Entry</h1>
    <div class="input-box customer-box">
        <input
            type="text"
            id="userName"
            placeholder="Search Customer..."
            autocomplete="off"
            oninput="filterCustomers()"
            onkeydown="customerKey(event)">
        <div id="customerDropdown" class="dropdown-list"></div>
    </div>
    <div class="input-box">
        <input
            type="date"
            id="userDate"
            onkeydown="moveNext(event,'userSudam')">
    </div>   
    <div class="input-box item-box">
        <input
            type="text"
            id="userSudam"
            placeholder="Search Item..."
            autocomplete="off"
            oninput="filterItems()"
            onkeydown="itemKey(event)">
        <div id="itemDropdown" class="dropdown-list"></div>
    </div>
    <div class="input-box">
        <input
            type="number"
            id="userQty"
            placeholder="Quantity"
            min="1"
            onkeydown="if(event.key==='Enter'){handleSubmit()}">
    </div>
    <button
        class="btn-submit"
        onclick="handleSubmit()">
        💾 Save Entry
    </button>
    <a href="outtable.html" class="view-link">
        📋 View OUT Records
    </a>
    <a href="balance.html" class="view-link">
        📊 Current Balance
    </a>
    <a href="intable.html" class="view-link">
        📥 Go to IN Records
    </a>
</div>

<!-- Import Firebase Modules via CDN -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase configuration object (Get this from Firebase Console)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase and Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global variables tied to window scope for HTML attribute access
    window.editId = null;
    window.customerList = [];
    window.itemList = [];
    window.customerIndex = -1;
    window.itemIndex = -1;

    // Fetch customers from Firestore "customers" collection
    async function loadCustomers(){
        try{
            const querySnapshot = await getDocs(collection(db, "customers"));
            window.customerList = [];
            querySnapshot.forEach((doc) => {
                window.customerList.push({ id: doc.id, ...doc.data() });
            });
        } catch(err){
            console.error("Error loading customers: ", err);
        }
    }

    // Fetch items from Firestore "items" collection
    async function loadItems(){
        try{
            const querySnapshot = await getDocs(collection(db, "items"));
            window.itemList = [];
            querySnapshot.forEach((doc) => {
                window.itemList.push({ id: doc.id, ...doc.data() });
            });
        } catch(err){
            console.error("Error loading items: ", err);
        }
    }

    document.addEventListener("DOMContentLoaded", async ()=>{
        await loadCustomers();
        await loadItems();
        document.getElementById("userName").focus();
        document.getElementById("userDate").value = new Date().toISOString().split("T")[0];
    });

    // Make functions globally accessible to standard HTML inline event handlers
    window.filterCustomers = function() {
        const keyword = document.getElementById("userName").value.trim().toLowerCase();
        const dropdown = document.getElementById("customerDropdown");
        dropdown.innerHTML = "";
        window.customerIndex = -1;
        if (keyword === "") {
            dropdown.style.display = "none";
            return;
        }
        const result = window.customerList.filter(c => c.name.toLowerCase().includes(keyword));
        if (result.length === 0) {
            dropdown.style.display = "none";
            return;
        }
        result.forEach(c => {
            dropdown.innerHTML += `
                <div class="dropdown-item" onclick="selectCustomer('${c.name}')">
                    👤 ${c.name}
                </div>
            `;
        });
        dropdown.style.display = "block";
    }

    window.selectCustomer = function(name){
        document.getElementById("userName").value = name;
        document.getElementById("customerDropdown").style.display = "none";
        document.getElementById("userDate").focus();
    }

    window.filterItems = function(){
        const keyword = document.getElementById("userSudam").value.toLowerCase();
        const dropdown = document.getElementById("itemDropdown");
        dropdown.innerHTML = "";
        window.itemIndex = -1;
        const result = window.itemList.filter(i => i.name.toLowerCase().includes(keyword));
        if(result.length == 0){
            dropdown.style.display = "none";
            return;
        }
        result.forEach(i => {
            dropdown.innerHTML += `
                <div class="dropdown-item" onclick="selectItem('${i.name}')">
                    📦 ${i.name}
                </div>
            `;
        });
        dropdown.style.display = "block";
    }

    window.selectItem = function(name){
        document.getElementById("userSudam").value = name;
        document.getElementById("itemDropdown").style.display = "none";
        document.getElementById("userQty").focus();
    }

    window.customerKey = function(e){
        const dropdown = document.getElementById("customerDropdown");
        const items = dropdown.querySelectorAll(".dropdown-item");
        if(dropdown.style.display == "none") return;
        if(e.key === "ArrowDown"){
            e.preventDefault();
            if(window.customerIndex < items.length - 1){ window.customerIndex++; }
        } else if(e.key === "ArrowUp"){
            e.preventDefault();
            if(window.customerIndex > 0){ window.customerIndex--; }
        } else if(e.key === "Enter"){
            e.preventDefault();
            if(window.customerIndex >= 0){ items[window.customerIndex].click(); }
            return;
        }
        items.forEach(x => x.classList.remove("active"));
        if(window.customerIndex >= 0){
            items[window.customerIndex].classList.add("active");
            items[window.customerIndex].scrollIntoView({ block: "nearest" });
        }
    }

    window.itemKey = function(e){
        const dropdown = document.getElementById("itemDropdown");
        const items = dropdown.querySelectorAll(".dropdown-item");
        if(dropdown.style.display == "none") return;
        if(e.key === "ArrowDown"){
            e.preventDefault();
            if(window.itemIndex < items.length - 1){ window.itemIndex++; }
        } else if(e.key === "ArrowUp"){
            e.preventDefault();
            if(window.itemIndex > 0){ window.itemIndex--; }
        } else if(e.key === "Enter"){
            e.preventDefault();
            if(window.itemIndex >= 0){ items[window.itemIndex].click(); }
            return;
        }
        items.forEach(x => x.classList.remove("active"));
        if(window.itemIndex >= 0){
            items[window.itemIndex].classList.add("active");
            items[window.itemIndex].scrollIntoView({ block: "nearest" });
        }
    }

    document.addEventListener("click", function(e){
        if(!e.target.closest(".customer-box")){ document.getElementById("customerDropdown").style.display = "none"; }
        if(!e.target.closest(".item-box")){ document.getElementById("itemDropdown").style.display = "none"; }
    });

    window.clearForm = function(){
        document.getElementById("userName").value = "";
        document.getElementById("userDate").value = new Date().toISOString().split("T")[0];
        document.getElementById("userSudam").value = "";
        document.getElementById("userQty").value = "";
        window.editId = null;
        document.getElementById("userName").focus();
    }

    window.moveNext = function(event, nextId){
        if(event.key === "Enter"){
            event.preventDefault();
            document.getElementById(nextId).focus();
        }
    }

    // Handles Adding or Updating data into Firestore "out_records" collection
    window.handleSubmit = async function() {
        const name = document.getElementById("userName").value.trim();
        const date = document.getElementById("userDate").value;
        const sudam = document.getElementById("userSudam").value.trim();
        const qty = Number(document.getElementById("userQty").value);

        if (!name || !date || !sudam || !qty) {
            alert("Please fill all fields.");
            return;
        }

        const data = { name, date, sudam, qty, timestamp: new Date() };

        try {
            if (window.editId == null) {
                // Equivalent to an INSERT SQL Query
                await addDoc(collection(db, "out_records"), data);
                alert("Entry Added Successfully!");
            } else {
                // Equivalent to an UPDATE SQL Query
                const recordRef = doc(db, "out_records", window.editId);
                await updateDoc(recordRef, data);
                alert("Entry Updated Successfully!");
            }
            window.clearForm();
        } catch (err) {
            console.error(err);
            alert("Firebase Database Error");
        }
    }
</script>
</body>
</html>
