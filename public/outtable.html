<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HouseSupply-OUT Records</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.top-bar{
    width:900px;
    display:flex;
    justify-content:flex-start;
    margin-bottom:15px;
}

.btn-back{
    padding:10px 20px;
    background:linear-gradient(135deg,#444,#111);
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.search-box{
    width:900px;
    margin-bottom:15px;
}

.search-box input{
    width:100%;
    height:42px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.display-container{
    width:900px;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

#stocktable{
    width:100%;
    border-collapse:collapse;
}

#stocktable th{
    background:#0f766e;
    color:white;
    padding:12px;
    text-align:center;
}

#stocktable td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

#stocktable tbody tr:hover{
    background:#f4f4f4;
}

.action-btn{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin:2px;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

.receive-btn{
    background:#16a34a;
}

.pagination{
    margin-top:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.pagination button{
    padding:8px 14px;
    border:none;
    background:teal;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.pagination button:disabled{
    background:#ccc;
}
</style>
</head>

<body>

<div class="top-bar">
    <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
</div>

<div class="search-box">
    <input type="text"
           id="searchName"
           placeholder="Search Customer..."
           onkeyup="searchData()">
</div>

<div class="display-container">

<table id="stocktable">
<thead>
<tr>
<th>Customer</th>
<th>Date</th>
<th>Item</th>
<th>OUT Qty</th>
<th>Received</th>
<th>Pending</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tablebody"></tbody>
</table>

<div class="pagination">
<button id="btnPrev" onclick="changePage(-1)">Previous</button>
<span id="pageInfo">Page 1</span>
<button id="btnNext" onclick="changePage(1)">Next</button>
</div>

</div>

<!-- Firebase Modules -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase Configuration (Keep this identical across all project pages)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Maintain local state arrays matching your original logic
    let rawCloudData = [];
    window.filteredData = [];
    window.currentPage = 1;
    const rowsPerPage = 8;

    // Fetch master list from Firestore
    async function displayTable() {
        try {
            const querySnapshot = await getDocs(collection(db, "out_records"));
            rawCloudData = [];
            querySnapshot.forEach((doc) => {
                // doc.id replaces your MySQL 'id' auto-increment number with a unique string hash
                rawCloudData.push({ id: doc.id, ...doc.data() });
            });
            
            window.filteredData = [...rawCloudData];
            window.currentPage = 1;
            renderRows();
        } catch (err) {
            console.error("Error reading out_records: ", err);
        }
    }

    // Client-side text array matching query
    window.searchData = function() {
        const searchValue = document.getElementById("searchName").value.toLowerCase();
        window.filteredData = rawCloudData.filter(item =>
            item.name.toLowerCase().includes(searchValue)
        );
        window.currentPage = 1;
        renderRows();
    }

    // Calculate pagination rules and append markup rows
    function renderRows() {
        const tablebody = document.getElementById("tablebody");
        tablebody.innerHTML = "";

        const totalPages = Math.ceil(window.filteredData.length / rowsPerPage) || 1;
        const startIndex = (window.currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const paginatedItems = window.filteredData.slice(startIndex, endIndex);

        paginatedItems.forEach(item => {
            // Safe fallback value injection if fields aren't initialized yet in database
            const outQty = Number(item.qty) || 0;
            const receivedQty = Number(item.receivedQty) || 0;
            const pendingQty = Number(item.pendingQty) !== undefined ? Number(item.pendingQty) : (outQty - receivedQty);

            let status = "";
            if (receivedQty === 0) {
                status = "🔴 Not Received";
            } else if (pendingQty === 0) {
                status = "🟢 Completed";
            } else {
                status = "🟡 Partial";
            }

            tablebody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.date}</td>
                    <td>${item.sudam}</td>
                    <td>${outQty}</td>
                    <td>${receivedQty}</td>
                    <td>${pendingQty}</td>
                    <td style="font-weight:bold;">${status}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editData('${item.id}')">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteData('${item.id}')">Delete</button>
                        <button class="action-btn receive-btn" onclick="receiveItem('${item.name}','${item.sudam}')">Receive</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById("pageInfo").innerHTML = `Page ${window.currentPage} of ${totalPages}`;
        document.getElementById("btnPrev").disabled = window.currentPage == 1;
        document.getElementById("btnNext").disabled = window.currentPage == totalPages;
    }

    window.changePage = function(direction) {
        window.currentPage += direction;
        renderRows();
    }

    // Direct Firestore collection entry removal
    window.deleteData = async function(id) {
        if (confirm("Are you sure to delete this record?")) {
            try {
                await deleteDoc(doc(db, "out_records", id));
                displayTable(); // re-sync local arrays
            } catch (err) {
                console.error("Deletion error: ", err);
                alert("Could not remove document cleanly from the server.");
            }
        }
    }

    window.editData = function(id) {
        // String alphanumeric ID hashes work perfectly inside URL queries
        window.location.href = `out.html?edit=${id}`;
    }

    window.receiveItem = function(name, sudam) {
        window.location.href = `intable.html?name=${encodeURIComponent(name)}&item=${encodeURIComponent(sudam)}`;
    }

    // Load table data immediately upon opening screen
    document.addEventListener("DOMContentLoaded", displayTable);
</script>

</body>
</html>
