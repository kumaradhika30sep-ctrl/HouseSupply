<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HouseSupply-OUT Records</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.top-bar{
    width:900px;
    display:flex;
    justify-content:flex-start;
    margin-bottom:15px;
}

.btn-back{
    padding:10px 20px;
    background:linear-gradient(135deg,#444,#111);
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.search-box{
    width:900px;
    margin-bottom:15px;
}

.search-box input{
    width:100%;
    height:42px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.display-container{
    width:900px;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

#stocktable{
    width:100%;
    border-collapse:collapse;
}

#stocktable th{
    background:#0f766e;
    color:white;
    padding:12px;
    text-align:center;
}

#stocktable td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

#stocktable tbody tr:hover{
    background:#f4f4f4;
}

.action-btn{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin:2px;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

.receive-btn{
    background:#16a34a;
}

.pagination{
    margin-top:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.pagination button{
    padding:8px 14px;
    border:none;
    background:teal;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.pagination button:disabled{
    background:#ccc;
}
</style>
</head>

<body>

<div class="top-bar">
    <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
</div>

<div class="search-box">
    <input type="text"
           id="searchName"
           placeholder="Search Customer..."
           onkeyup="searchData()">
</div>

<div class="display-container">

<table id="stocktable">

<thead>

<tr>

<th>Customer</th>
<th>Date</th>
<th>Item</th>
<th>OUT Qty</th>
<th>Received</th>
<th>Pending</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tablebody">

</tbody>

</table>

<div class="pagination">

<button id="btnPrev"
onclick="changePage(-1)">
Previous
</button>

<span id="pageInfo">
Page 1
</span>

<button id="btnNext"
onclick="changePage(1)">
Next
</button>

</div>

</div>

<script>

let filteredData=[];
let currentPage=1;
const rowsPerPage=8;
document.addEventListener("DOMContentLoaded", displayTable);

async function displayTable() {

    const res = await fetch("http://localhost:3000/out/data");
    filteredData = await res.json();

    currentPage = 1;
    renderRows();
}

async function searchData() {

    const searchValue =
        document.getElementById("searchName")
        .value
        .toLowerCase();

    const res = await fetch("http://localhost:3000/out/data");
    const data = await res.json();

    filteredData = data.filter(item =>
        item.name.toLowerCase().includes(searchValue)
    );

    currentPage = 1;

    renderRows();
}

function renderRows() {

    const tablebody = document.getElementById("tablebody");

    tablebody.innerHTML = "";

    const totalPages =
        Math.ceil(filteredData.length / rowsPerPage) || 1;

    const startIndex =
        (currentPage - 1) * rowsPerPage;

    const endIndex =
        startIndex + rowsPerPage;

    const paginatedItems =
        filteredData.slice(startIndex, endIndex);

    paginatedItems.forEach(item => {

        let status = "";

        if (Number(item.receivedQty) == 0) {

            status = "🔴 Not Received";

        }

        else if (Number(item.pendingQty) == 0) {

            status = "🟢 Completed";

        }

        else {

            status = "🟡 Partial";

        }

        tablebody.innerHTML += `

<tr>

<td><strong>${item.name}</strong></td>

<td>${item.date}</td>

<td>${item.sudam}</td>

<td>${item.qty}</td>

<td>${item.receivedQty}</td>

<td>${item.pendingQty}</td>

<td style="font-weight:bold;">
${status}
</td>

<td>

<button
class="action-btn edit-btn"
onclick="editData(${item.id})">
Edit
</button>

<button
class="action-btn delete-btn"
onclick="deleteData(${item.id})">
Delete
</button>

<button
class="action-btn receive-btn"
onclick="receiveItem('${item.name}','${item.sudam}')">
Receive
</button>

</td>

</tr>

`;
    });

    document.getElementById("pageInfo").innerHTML =
        `Page ${currentPage} of ${totalPages}`;

    document.getElementById("btnPrev").disabled =
        currentPage == 1;

    document.getElementById("btnNext").disabled =
        currentPage == totalPages;

}
function changePage(direction) {

    currentPage += direction;

    renderRows();

}

async function deleteData(id) {

    if (confirm("Are you sure to delete this record?")) {

        await fetch(
            `http://localhost:3000/out/delete/${id}`,
            {
                method: "DELETE"
            }
        );

        displayTable();

    }

}

function editData(id) {

    window.location.href =
        `out.html?edit=${id}`;

}

function receiveItem(name, sudam) {

    window.location.href =
        `intable.html?name=${encodeURIComponent(name)}&item=${encodeURIComponent(sudam)}`;

}
</script>

</body>
</html>
