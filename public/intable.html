<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HouseSupply-IN Records</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
            padding-top: 20px;
        }

        .top-bar {
            width: 700px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: -5px;
        }

        .btn-back {
            padding: 10px 20px;
            background: linear-gradient(135deg, #444, #111);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.9;
        }

        .search-box {
            width: 700px;
            margin: 20px 0 10px;
        }

        .search-box input {
            width: 100%;
            height: 40px;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            background-color: white;
        }

        .search-box input:focus {
            border-color: teal;
        }

        .display-container {
            width: 700px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #eef2f5;
        }

        #stocktable {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #eef2f5;
        }

        #stocktable th {
            background-color: #f8fafc;
            color: #475569;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px;
            border-bottom: 2px solid #e2e8f0;
            text-align: center;
        }

        #stocktable td {
            padding: 14px 16px;
            color: #334155;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        #stocktable tbody tr:nth-child(even) {
            background-color: #f8fafc;
        }

        #stocktable tbody tr:hover {
            background-color: #f1f5f9;
        }

        #stocktable tbody tr:last-child td {
            border-bottom: none;
        }

        .negative-diff {
            color: #dc2626;
            font-weight: bold;
        }

        .positive-diff {
            color: #16a34a;
            font-weight: bold;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }

        .pagination button {
            padding: 6px 12px;
            border: none;
            background: teal;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .pagination button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #pageInfo {
            font-size: 14px;
            font-weight: bold;
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
    </div>
    
    <div class="display-container" style="margin-bottom:20px;">
        <h2 style="margin-bottom:15px;">Receive Material</h2>

        <div class="search-box" style="width:100%;margin:0;">
            <input type="text" id="receiveName" placeholder="Customer Name" readonly>
        </div>

        <div class="search-box" style="width:100%;margin-top:10px;">
            <input type="text" id="receiveItem" placeholder="Item" readonly>
        </div>

        <div class="search-box" style="width:100%;margin-top:10px;">
            <input type="date" id="receiveDate">
        </div>

        <div class="search-box" style="width:100%;margin-top:10px;">
           <input type="number" id="receiveQty" placeholder="Receive Qty" onkeydown="submitOnEnter(event)">
        </div>

        <button class="btn-back" style="margin-top:15px;" onclick="submitReceive()">
            Submit
        </button>
    </div>

    <div class="search-box">
        <input type="text" id="searchName" placeholder="Search Customer..." onkeyup="searchData()">
    </div>

    <div class="display-container">
        <table id="stocktable">
            <thead>
                <tr>
                    <th>CustomerName</th>
                    <th>Date</th>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Days Taken</th>
                    <th>Qty Difference</th>
                </tr>
            </thead>
            <tbody id="tablebody"></tbody>
        </table>

        <div class="pagination">
            <button id="btnPrev" onclick="changePage(-1)">Previous</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button id="btnNext" onclick="changePage(1)">Next</button>
        </div>
    </div>

<!-- Firebase Script Execution Modules -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Keep configuration consistent across all screens
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let rawInCloudData = [];
    window.filteredData = [];
    window.currentPage = 1;
    const rowsPerPage = 7;

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const name = params.get("name");
        const item = params.get("item");
        
        document.getElementById("receiveName").value = name || "";
        document.getElementById("receiveItem").value = item || "";
        document.getElementById("receiveDate").value = new Date().toISOString().split("T")[0];

        refreshAllData();
    });

    window.refreshAllData = async function() {
        await displayTable();
    }

    // Pull directly from Firestore "in_records" collection
    window.displayTable = async function(){
        try {
            const querySnapshot = await getDocs(collection(db, "in_records"));
            rawInCloudData = [];
            querySnapshot.forEach((doc) => {
                rawInCloudData.push({ id: doc.id, ...doc.data() });
            });
            window.filteredData = [...rawInCloudData];
            window.currentPage = 1;
            renderRows();
        } catch (error) {
            console.error("Error displaying table data:", error);
        }
    }

    window.searchData = function() {
        const searchValue = document.getElementById('searchName').value.trim().toLowerCase();
        if (searchValue === "") {
            window.filteredData = [...rawInCloudData];
        } else {
            window.filteredData = rawInCloudData.filter(item => item.name.toLowerCase().includes(searchValue));
        }
        window.currentPage = 1;
        renderRows();
    }

    function renderRows() {
        const tablebody = document.getElementById('tablebody');
        tablebody.innerHTML = "";

        const totalPages = Math.ceil(window.filteredData.length / rowsPerPage) || 1;
        const startIndex = (window.currentPage - 1) * rowsPerPage;
        const endIndex = startIndex + rowsPerPage;
        const paginatedItems = window.filteredData.slice(startIndex, endIndex);

        paginatedItems.forEach(item => {
            let diffClass = "";
            const diff = item.qty_difference;
            if(diff !== null && diff !== undefined) {
                diffClass = diff < 0 ? "negative-diff" : (diff > 0 ? "positive-diff" : "");
            }

            tablebody.innerHTML += `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>${item.date ? item.date.split('T')[0] : '-'}</td>
                <td>${item.sudam}</td>
                <td>${item.qty}</td>
                <td>${item.days_taken ?? '-'}</td>
                <td class="${diffClass}">${diff ?? '-'}</td>
            </tr>`;
        });

        document.getElementById('pageInfo').innerText = `Page ${window.currentPage} of ${totalPages}`;
        document.getElementById('btnPrev').disabled = (window.currentPage === 1);
        document.getElementById('btnNext').disabled = (window.currentPage === totalPages);
    }

    window.changePage = function(direction) {
        window.currentPage += direction;
        renderRows();
    }

    window.submitReceive = async function() {
        const name = document.getElementById("receiveName").value;
        const sudam = document.getElementById("receiveItem").value;
        const date = document.getElementById("receiveDate").value;
        const qtyInput = document.getElementById("receiveQty").value;

        if (!name || !sudam || !date || !qtyInput) {
            alert("Please enter Customer, Item, Date and Quantity");
            return;
        }

        const qty = Number(qtyInput);

        try {
            // Find corresponding record in "out_records" to compute days_taken and differences
            const outQuery = query(
                collection(db, "out_records"), 
                where("name", "==", name), 
                where("sudam", "==", sudam)
            );
            const outSnapshot = await getDocs(outQuery);

            let days_taken = "-";
            let qty_difference = 0;
            let targetOutDocId = null;
            let currentReceivedQty = 0;
            let targetOutQty = 0;

            if (!outSnapshot.empty) {
                // Pick the first matching record context
                const outDoc = outSnapshot.docs[0];
                targetOutDocId = outDoc.id;
                const outData = outDoc.data();
                
                targetOutQty = Number(outData.qty) || 0;
                currentReceivedQty = Number(outData.receivedQty) || 0;

                // Calculate date delta metrics
                const dateOut = new Date(outData.date);
                const dateIn = new Date(date);
                const diffTime = Math.abs(dateIn - dateOut);
                days_taken = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                qty_difference = qty - targetOutQty;
            }

            // Write inside "in_records"
            await addDoc(collection(db, "in_records"), {
                name,
                sudam,
                date,
                qty,
                days_taken,
                qty_difference
            });

            // Update balance counters in the source "out_records" document
            if (targetOutDocId) {
                const newReceivedTotal = currentReceivedQty + qty;
                const newPending = Math.max(0, targetOutQty - newReceivedTotal);
                
                await updateDoc(doc(db, "out_records", targetOutDocId), {
                    receivedQty: newReceivedTotal,
                    pendingQty: newPending
                });
            }

            alert("Material received and updated successfully!");

            // Clear visual inputs
            document.getElementById("receiveName").value = "";
            document.getElementById("receiveItem").value = "";
            document.getElementById("receiveQty").value = "";
            document.getElementById("receiveDate").value = new Date().toISOString().split("T")[0];

            window.history.replaceState({}, "", "intable.html");
            refreshAllData();

        } catch (err) {
            console.error(err);
            alert("Database Error encountered during receipt processing.");
        }
    }

    window.submitOnEnter = function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            window.submitReceive();
        }
    }
</script>
</body>
</html>
